    />
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="stylesheet" href="./src/mobile.css" />

  <body class="index-page">

      <a href="./index.html" class="logo pointer">

      <nav>

          <li><a href="./project.html">PROJECT</a></li>
          <li><a href="./team.html">TEAM</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="start">
        <h1 class="title">KIM’s</h1>
        <h3 class="subtitle">WELCOME TO MY WEBSITE OF PORTFOLIO</h3>
      </section>

      <section class="start-grid">
        <div class="start-payload-grid">
          <h2 class="payload">
            매일의 기록으로<br />
            나를 넘어서는,
          </h2>
          <img
            src="./assets/people/kjh.png"
            alt="열정적인 사진"
            class="profile-img"
          />
        </div>
        <div class="start-payload-grid top-align">
          <div class="description-list">
            <img src="./assets/html.png" alt="html" />
          </div>
          <h2 class="payload">웹 개발부터 시스템 해킹까지</h2>
          <div class="description-list">
            <img src="./assets/pwn.png" alt="pwn" />
          </div>
        </div>

        <div class="start-payload-grid">
          <img
            src="./assets/people/laptop.png"
            alt="노트북 사진"
            class="profile-img"
          />
          <h2 class="payload">
            정보보호학전공<br />

          </h2>
        </div>

    <footer>
      <h3>MY LINKS !</h3>
      <div class="links-container">
        <a href="https://github.com/junghyunkim329" class="link" target="_blank"

      <div class="info">

      </div>
    </footer>
    <script>
      // 햄버거 메뉴
      const menuToggle = document.getElementById('mobile-menu')
      const navLinks = document.getElementById('nav-links')

      menuToggle.addEventListener('click', () => {
        navLinks.classList.toggle('active')
      })

      // Intersection Observer 설정
      const observerOptions = {
        root: null, // 브라우저 뷰포트를 기준으로 감시
        threshold: 0.1, // 요소가 10% 정도 보이기 시작할 때 실행
      }

      const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            // 화면에 들어왔을 때 'show' 클래스 추가
            entry.target.classList.add('show')
            // 한 번 나타난 후에는 감시를 중단하고 싶다면 아래 주석 제거
            observer.unobserve(entry.target)
          }
        })
      }, observerOptions)

      // .start-payload-grid 클래스를 가진 모든 요소를 찾아 감시 시작
      const revealElements = document.querySelectorAll('.start-payload-grid')
      revealElements.forEach((el) => observer.observe(el))
    </script>
  </body>
</html>
