<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KIM’s</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Chiron+Hei+HK:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="stylesheet" href="./src/team.css" />
    <link rel="stylesheet" href="./src/mobile.css" />
  </head>
  <body>
    <header>
      <a href="./index.html" class="logo pointer">
        <img src="./assets/home.png" alt="" class="logo-img" />
        <div class="nav-link">HOME</div>
      </a>
      <img
        src="./assets/list.png"
        alt=""
        class="menu-toggle"
        id="mobile-menu"
      />
      <nav>
        <ul class="nav-link pointer" id="nav-links">
          <li><a href="./project.html">PROJECT</a></li>
          <li><a href="./team.html">TEAM</a></li>
        </ul>
      </nav>
    </header>

    <!-- public main -->
    <main class="container">
      <section class="container-header">
        <h1 class="giant-title">PROJECT</h1>
      </section>

      <section class="project-list">
        <div class="scp">
          <img src="./assets/folder.png" alt="" />
        </div>
      </section>
    </main>

    <footer>
      <h3>MY LINKS !</h3>
      <div class="links-container">
        <a href="https://github.com/junghyunkim329" class="link" target="_blank"
          >GITHUB</a
        >
        <a href="https://shshjang14.tistory.com/" class="link" target="_blank"
          >BLOG</a
        >
        <a href="https://studeo-flame.vercel.app/" class="link" target="_blank"
          >TEAM PROJECT</a
        >
      </div>
      <div class="info">
        <p class="left">KIM'S PORTFOLIO</p>
        <p class="right">©2026</p>
      </div>
    </footer>
    <script>
      // 햄버거 메뉴
      const menuToggle = document.getElementById('mobile-menu')
      const navLinks = document.getElementById('nav-links')

      menuToggle.addEventListener('click', () => {
        navLinks.classList.toggle('active')
      })

      // Intersection Observer 설정
      const observerOptions = {
        root: null, // 브라우저 뷰포트를 기준으로 감시
        threshold: 0.1, // 요소가 10% 정도 보이기 시작할 때 실행
      }

      const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            // 화면에 들어왔을 때 'show' 클래스 추가
            entry.target.classList.add('show')
            // 한 번 나타난 후에는 감시를 중단하고 싶다면 아래 주석 제거
            observer.unobserve(entry.target)
          }
        })
      }, observerOptions)

      // .start-payload-grid 클래스를 가진 모든 요소를 찾아 감시 시작
      const revealElements = document.querySelectorAll('.start-payload-grid')
      revealElements.forEach((el) => observer.observe(el))
    </script>
  </body>
</html>
