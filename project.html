    <script>
      // 햄버거 메뉴
      const menuToggle = document.getElementById('mobile-menu')
      const navLinks = document.getElementById('nav-links')

      menuToggle.addEventListener('click', () => {
        navLinks.classList.toggle('active')
      })

      // Intersection Observer 설정
      const observerOptions = {
        root: null, // 브라우저 뷰포트를 기준으로 감시
        threshold: 0.1, // 요소가 10% 정도 보이기 시작할 때 실행
      }

      const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            // 화면에 들어왔을 때 'show' 클래스 추가
            entry.target.classList.add('show')
            // 한 번 나타난 후에는 감시를 중단하고 싶다면 아래 주석 제거
            observer.unobserve(entry.target)
          }
        })
      }, observerOptions)

      // .start-payload-grid 클래스를 가진 모든 요소를 찾아 감시 시작
      const etcSection = document.querySelector('.etc')
      observer.observe(etcSection)
    </script>
